version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=True
    env_file:
      - web/backend/.env.local
    command: uvicorn web.backend.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: web/frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web/frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
